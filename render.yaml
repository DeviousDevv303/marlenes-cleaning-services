services:
  - type: web
    name: marlenes-cleaning-services-api
    runtime: node
    plan: free
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: marlenes-cleaning-services-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false

databases:
  - name: marlenes-cleaning-services-db
    plan: free
    databaseName: marlenes_cleaning_services
    user: marlenes_cleaning_services
